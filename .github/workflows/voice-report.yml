name: Voice Usage Report

on:
  schedule:
    - cron: '0 11 * * 1,4'   # 11:00 UTC = 7:00 AM ET (EDT) — Mon & Thu
  workflow_dispatch:            # Manual trigger from Actions tab

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Push to gh-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Full history for gh-pages worktree

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install psycopg2-binary openpyxl jinja2

      - name: Install Node deps
        run: npm install xlsx

      - name: Set date (yesterday)
        run: echo "DATE=$(date -u -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Fetch data
        run: python fetch-daily-data.py --date $DATE

      - name: Generate reports
        run: |
          python generate-daily-report.py --date $DATE
          node generate-daily-dashboard.js --date $DATE

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash deploy-to-pages.sh --date $DATE
